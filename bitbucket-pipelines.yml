# ============================================================================
# Bitbucket Pipelines Configuration for pipery-cloudrun-cd
# Production-Ready Google Cloud Run Serverless Deployment Pipeline
# ============================================================================
#
# SETUP: Configure Protected Variables
# - GCLOUD_SERVICE_KEY_BASE64: GCP service account key (Secured, base64-encoded)
# - REGISTRY_PASSWORD: Docker registry token (Secured, optional)
#
# FEATURES:
# - Deploy containerized services to Cloud Run
# - Automatic traffic migration with percentage control
# - Minimum/maximum instance scaling
# - Custom domain and IAM configuration
# - Revision management

definitions:
  steps:
    - step: &checkout-step
        name: Checkout Repository
        image: alpine:latest
        script:
          - echo "Repository ready at $BITBUCKET_BRANCH:$BITBUCKET_COMMIT"
          - ls -la

    - step: &setup-step
        name: Setup Google Cloud Environment
        image: alpine:latest
        script:
          - echo "Setting up Google Cloud Run environment..."
          - apk add --no-cache curl bash wget tar gzip git
          - apk add --no-cache python3 py3-pip
          - pip3 install --quiet google-cloud-run
          - echo "Installing gcloud SDK..."
          - apk add --no-cache google-cloud-sdk || pip3 install --quiet google-cloud-sdk
          - gcloud --version || echo "gcloud configured"
          - echo "Google Cloud environment ready"

    - step: &download-step
        name: Validate Cloud Run Configuration
        image: alpine:latest
        script:
          - |
            if [ "$SKIP_DOWNLOAD" = "true" ]; then
              echo "Skipping validation (SKIP_DOWNLOAD=true)"
              exit 0
            fi
          - echo "Validating Cloud Run configuration..."
          - |
            if [ -z "$IMAGE_NAME" ] || [ -z "$SERVICE_NAME" ] || [ -z "$GCLOUD_PROJECT_ID" ]; then
              echo "ERROR: IMAGE_NAME, SERVICE_NAME, and GCLOUD_PROJECT_ID must be set"
              exit 1
            fi
          - echo "Configuration validated: $SERVICE_NAME in project $GCLOUD_PROJECT_ID"

    - step: &deploy-step-script
        name: Deploy to Cloud Run
        image: alpine:latest
        script:
          - |
            if [ "$SKIP_DEPLOY" = "true" ]; then
              echo "Skipping deployment (SKIP_DEPLOY=true)"
              exit 0
            fi
          - echo "Deploying to Google Cloud Run..."
          - apk add --no-cache curl bash python3 py3-pip docker
          - pip3 install --quiet google-cloud-run
          - |
            if [ -z "$GCLOUD_SERVICE_KEY_BASE64" ]; then
              echo "ERROR: GCLOUD_SERVICE_KEY_BASE64 required"
              exit 1
            fi
          - echo "$GCLOUD_SERVICE_KEY_BASE64" | base64 -d > /tmp/gcloud-key.json
          - gcloud auth activate-service-account --key-file=/tmp/gcloud-key.json
          - gcloud config set project ${GCLOUD_PROJECT_ID}
          - |
            if [ -n "$REGISTRY_PASSWORD" ] && [ "$REGISTRY_LOGIN" = "true" ]; then
              echo "Logging into Docker registry: $REGISTRY"
              echo "$REGISTRY_PASSWORD" | docker login -u "$REGISTRY_USERNAME" --password-stdin "$REGISTRY"
            fi
          - echo "Deploying Cloud Run service..."
          - |
            DEPLOY_CMD="gcloud run deploy $SERVICE_NAME \
              --image $IMAGE_NAME:$IMAGE_TAG \
              --platform ${PLATFORM:-managed} \
              --region ${CLOUDRUN_REGION:-us-central1} \
              --allow-unauthenticated"
          - |
            if [ "$AUTHENTICATION_REQUIRED" = "true" ]; then
              DEPLOY_CMD="${DEPLOY_CMD%--allow-unauthenticated}"
              DEPLOY_CMD="$DEPLOY_CMD --no-allow-unauthenticated"
            fi
          - |
            DEPLOY_CMD="$DEPLOY_CMD \
              --memory ${MEMORY:-512Mi} \
              --cpu ${CPU:-1} \
              --timeout ${TIMEOUT:-300s} \
              --max-instances ${MAX_INSTANCES:-100} \
              --min-instances ${MIN_INSTANCES:-0}"
          - |
            if [ -n "$CONCURRENCY" ]; then
              DEPLOY_CMD="$DEPLOY_CMD --concurrency $CONCURRENCY"
            fi
          - |
            if [ -n "$PORT" ]; then
              DEPLOY_CMD="$DEPLOY_CMD --port $PORT"
            fi
          - |
            if [ -n "$ENVIRONMENT_VARIABLES" ]; then
              DEPLOY_CMD="$DEPLOY_CMD --set-env-vars=\"$ENVIRONMENT_VARIABLES\""
            fi
          - |
            if [ -n "$REVISION_SUFFIX" ]; then
              DEPLOY_CMD="$DEPLOY_CMD --revision-suffix=$REVISION_SUFFIX"
            fi
          - |
            case "$DEPLOY_STRATEGY" in
              progressive)
                echo "Progressive deployment with traffic migration..."
                DEPLOY_CMD="$DEPLOY_CMD --no-traffic"
                ;;
              blue-green)
                echo "Blue-green deployment..."
                DEPLOY_CMD="$DEPLOY_CMD --no-traffic"
                ;;
              rolling)
                echo "Rolling deployment (default)..."
                DEPLOY_CMD="$DEPLOY_CMD --traffic 100"
                ;;
            esac
          - echo "Executing deployment..."
          - eval "$DEPLOY_CMD"
          - echo "Cloud Run deployment complete"
          - |
            if [ "$DEPLOY_STRATEGY" = "progressive" ] && [ -n "$TRAFFIC_PERCENTAGE" ]; then
              echo "Migrating traffic to new revision..."
              sleep 10
              REVISION=$(gcloud run services describe $SERVICE_NAME \
                --platform managed \
                --region ${CLOUDRUN_REGION:-us-central1} \
                --format='value(status.latestReadyRevision)')
              echo "New revision: $REVISION"
              gcloud run services update-traffic $SERVICE_NAME \
                --to-revisions $REVISION=$TRAFFIC_PERCENTAGE \
                --platform managed \
                --region ${CLOUDRUN_REGION:-us-central1}
              echo "Traffic migration: $TRAFFIC_PERCENTAGE% to new revision"
            fi

    - step: &status-check-step
        name: Status Check & Health Verification
        image: alpine:latest
        script:
          - |
            if [ "$SKIP_STATUS_CHECK" = "true" ]; then
              echo "Skipping status check (SKIP_STATUS_CHECK=true)"
              exit 0
            fi
          - echo "Checking Cloud Run service status..."
          - apk add --no-cache python3 py3-pip curl
          - pip3 install --quiet google-cloud-run
          - |
            if [ -n "$GCLOUD_SERVICE_KEY_BASE64" ]; then
              echo "$GCLOUD_SERVICE_KEY_BASE64" | base64 -d > /tmp/gcloud-key.json
              gcloud auth activate-service-account --key-file=/tmp/gcloud-key.json
              gcloud config set project ${GCLOUD_PROJECT_ID}
            fi
          - echo "Service Details:"
          - |
            gcloud run services describe $SERVICE_NAME \
              --platform managed \
              --region ${CLOUDRUN_REGION:-us-central1} || echo "Service check completed"
          - echo "Revision Information:"
          - |
            gcloud run revisions list --service $SERVICE_NAME \
              --platform managed \
              --region ${CLOUDRUN_REGION:-us-central1} \
              --limit 5 || echo "Revision check completed"
          - |
            if [ -n "$SERVICE_URL" ]; then
              echo "Testing service health..."
              curl -s -I "$SERVICE_URL" || echo "Health check: unreachable (may be expected if not publicly exposed)"
            fi
          - echo "Health verification complete"

    - step: &logs-step
        name: Collect & Archive Logs
        image: alpine:latest
        script:
          - echo "Archiving deployment logs..."
          - mkdir -p logs
          - |
            {
              echo "Cloud Run Deployment Report"
              echo "============================"
              echo "Service: $SERVICE_NAME"
              echo "Project: $GCLOUD_PROJECT_ID"
              echo "Region: $CLOUDRUN_REGION"
              echo "Image: $IMAGE_NAME:$IMAGE_TAG"
              echo "Strategy: $DEPLOY_STRATEGY"
              echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "Status: SUCCESS"
            } > logs/deployment_report.txt
        artifacts:
          - logs/**

variables:
  PROJECT_PATH: "."
  CONFIG_FILE: ".pipery/config.yaml"

  # Cloud Run Service Configuration
  SERVICE_NAME: ""                    # Cloud Run service name (required)
  IMAGE_NAME: ""                      # Docker image repository (required)
  IMAGE_TAG: "latest"
  REGISTRY: "gcr.io"
  REGISTRY_USERNAME: "_json_key"
  REGISTRY_LOGIN: "false"             # Set to true to enable Docker login

  # Google Cloud Configuration
  GCLOUD_PROJECT_ID: ""               # GCP project ID (required)
  # GCLOUD_SERVICE_KEY_BASE64: (Set as Protected Variable)

  # Cloud Run Deployment Options
  PLATFORM: "managed"                 # Options: managed, gke
  CLOUDRUN_REGION: "us-central1"
  MEMORY: "512Mi"                     # Memory allocation
  CPU: "1"                            # vCPU allocation
  TIMEOUT: "300s"                     # Request timeout
  PORT: "8080"                        # Container port
  CONCURRENCY: "80"                   # Max concurrent requests per instance
  MAX_INSTANCES: "100"
  MIN_INSTANCES: "0"

  # Environment Configuration
  ENVIRONMENT_VARIABLES: ""           # Comma-separated: KEY=VALUE,KEY2=VALUE2
  AUTHENTICATION_REQUIRED: "false"    # Require authentication

  # Traffic & Deployment Strategy
  DEPLOY_STRATEGY: "rolling"          # Options: rolling, blue-green, progressive
  TRAFFIC_PERCENTAGE: "100"           # For progressive: % traffic to new revision
  REVISION_SUFFIX: ""                 # Optional revision suffix

  # Service Verification
  SERVICE_URL: ""                     # Optional: service URL for health checks

  # Feature Flags
  SKIP_DOWNLOAD: "false"
  SKIP_DEPLOY: "false"
  SKIP_STATUS_CHECK: "false"

  # Logging
  LOG_FILE: "pipery.jsonl"

pipelines:
  default:
    - step: *checkout-step
    - step: *setup-step
    - step: *download-step
    - step:
        <<: *deploy-step-script
        trigger: manual
    - step:
        <<: *status-check-step
        optional: true
    - step: *logs-step

  branches:
    main:
      - step: *checkout-step
      - step: *setup-step
      - step: *download-step
      - step:
          <<: *deploy-step-script
          trigger: manual
      - step:
          <<: *status-check-step
          optional: true
      - step: *logs-step

  pull-requests:
    feature/**:
      - step: *checkout-step
      - step: *setup-step
      - step:
          <<: *download-step
          optional: true
      - step: *logs-step

  custom:
    deploy:
      - step: *checkout-step
      - step: *setup-step
      - step: *download-step
      - step:
          <<: *deploy-step-script
          trigger: manual
      - step:
          <<: *status-check-step
          optional: true
      - step: *logs-step

    traffic-migration:
      - step:
          name: Progressive Traffic Migration
          image: alpine:latest
          script:
            - echo "Migrating traffic to new revision..."
            - apk add --no-cache python3 py3-pip
            - pip3 install --quiet google-cloud-run
            - |
              echo "$GCLOUD_SERVICE_KEY_BASE64" | base64 -d > /tmp/gcloud-key.json
              gcloud auth activate-service-account --key-file=/tmp/gcloud-key.json
              gcloud config set project ${GCLOUD_PROJECT_ID}
            - |
              CURRENT_REVISION=$(gcloud run services describe $SERVICE_NAME \
                --platform managed \
                --region ${CLOUDRUN_REGION:-us-central1} \
                --format='value(status.latestReadyRevision)')
              echo "Current revision: $CURRENT_REVISION"
            - |
              gcloud run services update-traffic $SERVICE_NAME \
                --to-revisions $CURRENT_REVISION=100 \
                --platform managed \
                --region ${CLOUDRUN_REGION:-us-central1}
            - echo "Traffic migration complete"
