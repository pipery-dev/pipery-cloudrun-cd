# ============================================================================
# Bitbucket Pipelines Configuration for pipery-cloudrun-cd
# Production-Ready Google Cloud Run Serverless Deployment Pipeline
# ============================================================================
#
# SETUP: Configure Protected Variables
# - GCLOUD_SERVICE_KEY_BASE64: GCP service account key (Secured, base64-encoded)
# - REGISTRY_PASSWORD: Docker registry token (Secured, optional)
#
# FEATURES:
# - Deploy containerized services to Cloud Run
# - Automatic traffic migration with percentage control
# - Minimum/maximum instance scaling
# - Custom domain and IAM configuration
# - Revision management

definitions:
  steps:
    - step: &checkout-step
        name: Checkout Repository
        image: alpine:latest
        script:
          - echo "Repository ready at $BITBUCKET_BRANCH:$BITBUCKET_COMMIT"
          - ls -la

    - step: &setup-step
        name: Setup Google Cloud Environment
        image: alpine:latest
        script:
          - echo "Setting up Google Cloud Run environment..."
          - apk add --no-cache curl bash wget tar gzip git
          - apk add --no-cache python3 py3-pip
          - pip3 install --quiet google-cloud-run
          - echo "Installing gcloud SDK..."
          - apk add --no-cache google-cloud-sdk || pip3 install --quiet google-cloud-sdk
          - gcloud --version || echo "gcloud configured"
          - echo "Google Cloud environment ready"

    - step: &download-step
        name: Validate Cloud Run Configuration
        image: alpine:latest
        script:
          - echo "Validating Cloud Run configuration..."
          - |
            if [ -z "${INPUT_IMAGE_NAME}" ] || [ -z "${INPUT_SERVICE_NAME}" ] || [ -z "${INPUT_PROJECT_ID}" ]; then
              echo "ERROR: INPUT_IMAGE_NAME, INPUT_SERVICE_NAME, and INPUT_PROJECT_ID must be set"
              exit 1
            fi
          - echo "Configuration validated: ${INPUT_SERVICE_NAME} in project ${INPUT_PROJECT_ID}"

    - step: &deploy-step-script
        name: Deploy to Cloud Run
        image: alpine:latest
        script:
          - apk add --no-cache curl bash python3 py3-pip
          - pip3 install --quiet google-cloud-run
          - ./src/step-deploy.sh

    - step: &status-check-step
        name: Status Check & Health Verification
        image: alpine:latest
        script:
          - apk add --no-cache python3 py3-pip curl
          - pip3 install --quiet google-cloud-run
          - ./src/step-status.sh

    - step: &logs-step
        name: Collect & Archive Logs
        image: alpine:latest
        script:
          - echo "Archiving deployment logs..."
          - mkdir -p logs
          - |
            {
              echo "Cloud Run Deployment Report"
              echo "============================"
              echo "Service: $SERVICE_NAME"
              echo "Project: $GCLOUD_PROJECT_ID"
              echo "Region: $CLOUDRUN_REGION"
              echo "Image: $IMAGE_NAME:$IMAGE_TAG"
              echo "Strategy: $DEPLOY_STRATEGY"
              echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "Status: SUCCESS"
            } > logs/deployment_report.txt
        artifacts:
          - logs/**


    - step: &dashboard-link
        name: Pipery Dashboard Link
        image: alpine:latest
        optional: true
        max-time: 5
        script:
          - echo "=================================================="
          - echo "Pipery Dashboard Link Generator"
          - echo "=================================================="
          - echo ""
          - # Construct artifact URL using Bitbucket's build endpoint
          - ARTIFACT_URL="https://bitbucket.org/${BITBUCKET_REPO_FULL_NAME}/pipelines/${BITBUCKET_BUILD_NUMBER}"
          - ""
          - # URL encode using Python (if available) or fall back to direct URL
          - ENCODED_ARTIFACT=$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote('${ARTIFACT_URL}'))" 2>/dev/null || echo "${ARTIFACT_URL}")
          - ""
          - # Create dashboard URL
          - DASHBOARD_URL="https://dash.pipery.dev/?artifact=${ENCODED_ARTIFACT}"
          - ""
          - echo "Build Information:"
          - echo "  Repository: $BITBUCKET_REPO_FULL_NAME"
          - echo "  Build: $BITBUCKET_BUILD_NUMBER"
          - echo "  Branch: $BITBUCKET_BRANCH"
          - echo "  Commit: $BITBUCKET_COMMIT"
          - echo ""
          - echo "Artifact URL:"
          - echo "  $ARTIFACT_URL"
          - echo ""
          - echo "Dashboard Link:"
          - echo "[View in Pipery Dashboard]($DASHBOARD_URL)"
          - echo ""
          - |
            cat > dashboard-link.txt << 'DASHBOARD_EOF'
            # Pipery Dashboard Link

            Repository: $BITBUCKET_REPO_FULL_NAME
            Build: $BITBUCKET_BUILD_NUMBER
            Branch: $BITBUCKET_BRANCH
            Commit: $BITBUCKET_COMMIT
            Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)

            ## Dashboard
            [View in Pipery Dashboard]($DASHBOARD_URL)

            ## Direct Links
            - Bitbucket Build: https://bitbucket.org/${BITBUCKET_REPO_FULL_NAME}/pipelines/${BITBUCKET_BUILD_NUMBER}
            DASHBOARD_EOF
          - echo "Dashboard link info saved to dashboard-link.txt"
          - echo "=================================================="
        artifacts:
          - dashboard-link.txt

variables:
  INPUT_PROJECT_PATH: "."
  INPUT_CONFIG_FILE: ".pipery/config.yaml"

  # Cloud Run Service Configuration
  INPUT_SERVICE_NAME: ""               # Cloud Run service name (required)
  INPUT_IMAGE_NAME: ""                 # Docker image repository (required)
  INPUT_IMAGE_TAG: "latest"

  # Google Cloud Configuration
  INPUT_PROJECT_ID: ""                 # GCP project ID (required)
  # GCP_SA_KEY: (Set as Protected Variable)

  # Cloud Run Deployment Options
  INPUT_PLATFORM: "managed"            # Options: managed, gke
  INPUT_REGION: "us-central1"

  # Feature Flags
  INPUT_SKIP_PUSH: "false"
  INPUT_SKIP_DEPLOY: "false"
  INPUT_SKIP_STATUS_CHECK: "false"

  # Logging
  INPUT_LOG_FILE: "pipery.jsonl"

pipelines:
  default:
    - step: *checkout-step
    - step: *setup-step
    - step: *download-step
    - step:
        <<: *deploy-step-script
        trigger: manual
    - step:
        <<: *status-check-step
        optional: true
    - step: *logs-step
    - step: *dashboard-link

  branches:
    main:
      - step: *checkout-step
      - step: *setup-step
      - step: *download-step
      - step:
          <<: *deploy-step-script
          trigger: manual
      - step:
          <<: *status-check-step
          optional: true
      - step: *logs-step
      - step: *dashboard-link

  pull-requests:
    feature/**:
      - step: *checkout-step
      - step: *setup-step
      - step:
          <<: *download-step
          optional: true
      - step: *logs-step
      - step: *dashboard-link

  custom:
    deploy:
      - step: *checkout-step
      - step: *setup-step
      - step: *download-step
      - step:
          <<: *deploy-step-script
          trigger: manual
      - step:
          <<: *status-check-step
          optional: true
      - step: *logs-step
      - step: *dashboard-link

    traffic-migration:
      - step:
          name: Progressive Traffic Migration
          image: alpine:latest
          script:
            - echo "Migrating traffic to new revision..."
            - apk add --no-cache python3 py3-pip
            - pip3 install --quiet google-cloud-run
            - |
              echo "$GCLOUD_SERVICE_KEY_BASE64" | base64 -d > /tmp/gcloud-key.json
              gcloud auth activate-service-account --key-file=/tmp/gcloud-key.json
              gcloud config set project ${GCLOUD_PROJECT_ID}
            - |
              CURRENT_REVISION=$(gcloud run services describe $SERVICE_NAME \
                --platform managed \
                --region ${CLOUDRUN_REGION:-us-central1} \
                --format='value(status.latestReadyRevision)')
              echo "Current revision: $CURRENT_REVISION"
            - |
              gcloud run services update-traffic $SERVICE_NAME \
                --to-revisions $CURRENT_REVISION=100 \
                --platform managed \
                --region ${CLOUDRUN_REGION:-us-central1}
            - echo "Traffic migration complete"
