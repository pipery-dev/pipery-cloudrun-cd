spec:
  inputs:
    inputs:
    - name: PROJECT_PATH
      default: .
      description: Path to the project source tree
  outputs:
  - name: LOG_FILE
    description: Pipery JSONL log file with pipeline events
    default: pipery.jsonl
variables:
  PROJECT_PATH: .
  CONFIG_FILE: .pipery/config.yaml
  INPUT_PROJECT_PATH: .
  INPUT_CONFIG_FILE: .pipery/config.yaml
  INPUT_IMAGE_NAME: ''
  INPUT_IMAGE_TAG: $CI_COMMIT_SHA
  INPUT_SERVICE_NAME: ''
  INPUT_REGION: us-central1
  INPUT_PROJECT_ID: ''
  INPUT_PLATFORM: managed
  INPUT_TRAFFIC: '100'
  INPUT_MIN_INSTANCES: '0'
  INPUT_MAX_INSTANCES: '100'
  INPUT_CONCURRENCY: '80'
  INPUT_SKIP_PUSH: 'false'
  INPUT_SKIP_DEPLOY: 'false'
  INPUT_SKIP_STATUS_CHECK: 'false'
  INPUT_LOG_FILE: pipery.jsonl
stages:
- checkout
- setup
- download
- auth
- push
- deploy
- status_check
- logs
checkout:
  stage: checkout
  image: alpine:latest
  script:
  - echo "Repository checked out"
setup:
  stage: setup
  image: google/cloud-sdk:alpine
  script:
  - echo "Setting up Cloud SDK..."
  - gcloud version
  - gcloud config set project ${INPUT_PROJECT_ID} || true
  - echo "Setup complete"
download:
  stage: download
  image: alpine:latest
  script:
  - echo "Validating Cloud Run configuration..."
  - "if [ -z \"${INPUT_IMAGE_NAME}\" ] || [ -z \"${INPUT_SERVICE_NAME}\" ] || [ -z\
    \ \"${INPUT_PROJECT_ID}\" ]; then\n  echo \"ERROR: INPUT_IMAGE_NAME, INPUT_SERVICE_NAME,\
    \ and INPUT_PROJECT_ID must be set\"\n  exit 1\nfi\n"
  - echo "Configuration validated: ${INPUT_SERVICE_NAME} in project ${INPUT_PROJECT_ID}"
auth:
  stage: auth
  image: google/cloud-sdk:alpine
  script:
  - "if [ -z \"${GCP_SA_KEY:-}\" ]; then\n  echo \"ERROR: GCP_SA_KEY not set\"\n \
    \ exit 1\nfi\n"
  - echo "Authenticating with GCP..."
  - echo "${GCP_SA_KEY}" > /tmp/gcp-key.json
  - gcloud auth activate-service-account --key-file /tmp/gcp-key.json
  - gcloud config set project ${INPUT_PROJECT_ID}
  - gcloud auth configure-docker
  - rm /tmp/gcp-key.json
  - echo "Authentication complete"
push:
  stage: push
  image: google/cloud-sdk:alpine
  dependencies:
  - auth
  script:
  - ./src/step-push.sh
  rules:
  - if: $INPUT_SKIP_PUSH == "true"
    when: never
  - when: on_success
deploy:
  stage: deploy
  image: google/cloud-sdk:alpine
  dependencies:
  - push
  script:
  - ./src/step-deploy.sh
  rules:
  - if: $INPUT_SKIP_DEPLOY == "true"
    when: never
  - when: on_success
  artifacts:
    paths:
    - $INPUT_LOG_FILE
    expire_in: 30 days
status_check:
  stage: status_check
  image: google/cloud-sdk:alpine
  script:
  - ./src/step-status.sh
  rules:
  - if: $INPUT_SKIP_STATUS_CHECK == "true"
    when: never
  - when: on_success
  allow_failure: false
publish_logs:
  stage: logs
  image: alpine:latest
  script:
  - echo "Cloud Run deployment complete" | tee -a $INPUT_LOG_FILE
  artifacts:
    paths:
    - $INPUT_LOG_FILE
    expire_in: 90 days
  when: always
dashboard_link:
  stage: logs
  image: alpine:latest
  needs:
  - publish_logs
  script:
  - echo "Generating Pipery Dashboard link..."
  - '# Get the artifact URL from GitLab API

    ARTIFACT_URL="${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts"

    echo "Artifact URL: $ARTIFACT_URL"


    # URL encode the artifact path

    ENCODED_URL=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1],safe=''''))"
    "$ARTIFACT_URL")


    # Create dashboard link

    DASHBOARD_URL="https://dash.pipery.dev/?artifact=${ENCODED_URL}"


    # Output the link in markdown format

    echo ""

    echo "=========================================="

    echo "Pipery Dashboard Link"

    echo "=========================================="

    echo "[$DASHBOARD_URL]($DASHBOARD_URL)"

    echo ""

    echo "Direct URL:"

    echo "$DASHBOARD_URL"

    echo "=========================================="

    echo ""


    # Save to artifact file for persistence

    mkdir -p artifacts

    echo "DASHBOARD_URL=$DASHBOARD_URL" > artifacts/dashboard_link.env

    '
  artifacts:
    paths:
    - artifacts/
    reports:
      dotenv: artifacts/dashboard_link.env
    expire_in: 90 days
  allow_failure: true
  when: always
